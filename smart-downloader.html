<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Downloader - Technolia Tools</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center py-12">

  <h1 class="text-3xl font-bold mb-6 text-blue-700">Smart Downloader</h1>
  <input type="text" id="fileUrl" placeholder="Ingiza URL ya faili hapa" class="border border-gray-300 rounded px-3 py-2 w-96 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
  <button onclick="downloadFile()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 font-semibold">Pakua Sasa</button>

  <div id="log" class="mt-6 w-96 text-left"></div>

  <script>
    // Firebase config - badilisha na zako
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function log(msg){
      const logDiv = document.getElementById('log');
      logDiv.innerHTML += `<p>${msg}</p>`;
    }

    async function downloadFile(){
      const url = document.getElementById('fileUrl').value.trim();
      if(!url){ alert('Tafadhali weka URL!'); return; }

      log(`Kuanzia download: ${url}`);
      try {
        const a = document.createElement('a');
        a.href = url;
        a.download = url.split('/').pop() || 'downloaded-file';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        log('Download imefanikiwa!');

        // Save history Firestore
        await db.collection('downloads').add({
          url: url,
          timestamp: new Date()
        });
        log('Download imehifadhiwa Firestore.');
      } catch (e){
        log(`Kosa: ${e}`);
      }
    }
  </script>

</body>
</html>
